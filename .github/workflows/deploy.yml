name: Build and Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push API image
        run: |
          docker build -t ${{ secrets.ECR_API_REPO }}:${{ github.sha }} backend
          docker push ${{ secrets.ECR_API_REPO }}:${{ github.sha }}
      - name: Build and push Frontend image
        run: |
          docker build -t ${{ secrets.ECR_WEB_REPO }}:${{ github.sha }} frontend
          docker push ${{ secrets.ECR_WEB_REPO }}:${{ github.sha }}
      - name: Force ECS deployment
        run: |
          aws ecs update-service --cluster ${{ secrets.ECS_CLUSTER }} --service ${{ secrets.ECS_API_SERVICE }} --force-new-deployment
          aws ecs update-service --cluster ${{ secrets.ECS_CLUSTER }} --service ${{ secrets.ECS_WEB_SERVICE }} --force-new-deployment
